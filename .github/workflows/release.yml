name: Auto Release Packager

on:
  push:
    tags:
      - 'v*' # 當推送以 v 開頭的標籤（例如 v1.0.0, v1.0.1）時觸發
  workflow_dispatch: # 允許在 GitHub 網頁上點擊按鈕手動觸發測試與打包

# 賦予 GitHub Actions 寫入發布檔案的權限
permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      # 1. 檢出專案程式碼
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 設定 Node.js 環境以執行單元測試
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3. 執行單元測試（品質驗證）
      - name: Run unit tests
        run: |
          cd bga-agricola-compact-extension-v0.4.1
          node --test tests/*.test.mjs

      # 4. 執行打包腳本（使用 pwsh 跨平台執行您的 build-release.ps1）
      - name: Run build-release script
        shell: pwsh
        run: |
          cd bga-agricola-compact-extension-v0.4.1
          ./scripts/build-release.ps1

      # 5. 自動建立 GitHub Release 並上傳 Zip 檔案
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: bga-agricola-compact-extension-v0.4.1/dist/bga-agricola-compact-panel-v*.zip
          draft: false
          prerelease: false
          name: Release ${{ github.ref_name }}
          body: |
            ## Agricola Online Mode ${{ github.ref_name }}
            
            雙語說明請參閱 [README.md](https://github.com/${{ github.repository }}/blob/master/README.md)
            Please refer to the [README.md](https://github.com/${{ github.repository }}/blob/master/README.md) for bilingual documentation.
            
            ### 安裝方式 / Installation
            1. 下載下方附件中的 `bga-agricola-compact-panel-v*.zip` 並解壓縮。
            2. 開啟 Chrome 前往 `chrome://extensions/` 並開啟「開發者模式」。
            3. 點選「載入解壓縮開發中擴充功能」，選取解壓後的資料夾即可。
            
            ---
            *Auto-generated by GitHub Actions.*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
